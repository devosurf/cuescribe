name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      - run: go vet ./...

  build-darwin-arm64:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: |
          mkdir -p dist
          GOOS=darwin GOARCH=arm64 go build \
            -ldflags "-s -w -X github.com/devosurf/cuescribe/internal/version.Commit=${GITHUB_SHA} -X github.com/devosurf/cuescribe/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/cuescribe-darwin-arm64 ./cmd/cuescribe
          sha256sum dist/cuescribe-darwin-arm64 | awk '{print $1}' > dist/cuescribe-darwin-arm64.sha256
      - name: Manifest
        run: |
          version="${GITHUB_REF_NAME}"
          binary_sha256="$(cat dist/cuescribe-darwin-arm64.sha256)"
          binary_url="https://github.com/devosurf/cuescribe/releases/download/${version}/cuescribe-darwin-arm64"
          cat > dist/manifest.json <<EOF
          {
            "version": "${version}",
            "platform": "darwin-arm64",
            "binary_url": "${binary_url}",
            "binary_sha256": "${binary_sha256}",
            "models": [
              {"name":"tiny","url":"https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.bin?download=true","sha256":"be07e048e1e599ad46341c8d2a135645097a538221678b7acdd1b1919c6e1b21"},
              {"name":"base","url":"https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.bin?download=true","sha256":"60ed5bc3dd14eea856493d334349b405782ddcaf0028d4b5df4088345fba2efe"},
              {"name":"small","url":"https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.bin?download=true","sha256":"1be3a9b2063867b937e64e2ec7483364a79917e157fa98c5d94b5c1fffea987b"},
              {"name":"medium","url":"https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-medium.bin?download=true","sha256":"6c14d5adee5f86394037b4e4e8b59f1673b6cee10e3cf0b11bbdbee79c156208"},
              {"name":"large-v3-turbo","url":"https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-large-v3-turbo.bin?download=true","sha256":"1fc70f774d38eb169993ac391eea357ef47c88757ef72ee5943879b7e8e2bc69"}
            ]
          }
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: cuescribe-darwin-arm64
          path: |
            dist/cuescribe-darwin-arm64
            dist/cuescribe-darwin-arm64.sha256
            dist/manifest.json
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cuescribe-darwin-arm64
            dist/cuescribe-darwin-arm64.sha256
            dist/manifest.json
